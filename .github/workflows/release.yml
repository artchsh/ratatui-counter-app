name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ratatui-counter-app-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ratatui-counter-app-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ratatui-counter-app-macos-apple-silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ratatui-counter-app-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --no-default-features

      - name: Package Linux (.deb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          PKG=ratatui-counter-app_amd64
          mkdir -p dist/$PKG/DEBIAN dist/$PKG/usr/bin
          cp target/${{ matrix.target }}/release/ratatui-counter-app dist/$PKG/usr/bin/
          chmod +x dist/$PKG/usr/bin/ratatui-counter-app
          printf 'Package: ratatui-counter-app\nVersion: 0.1.0\nArchitecture: amd64\nMaintainer: artchsh\nDescription: Ratatui counter app\n' \
            > dist/$PKG/DEBIAN/control
          dpkg-deb --build dist/$PKG dist/ratatui-counter-app.deb

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ratatui-counter-app dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\ratatui-counter-app.exe dist\ratatui-counter-app.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          retention-days: 1

  source:
    name: Source Archive
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: git archive --format=zip --output=source-code.zip HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: source-code.zip
          retention-days: 1

  release:
    name: Create Release
    needs: [build, source]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.run_number) }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.run_number) }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Source Code | source-code.zip |
            | Linux x64 | ratatui-counter-app.deb |
            | macOS Intel | ratatui-counter-app-macos-intel |
            | macOS Apple Silicon | ratatui-counter-app-macos-apple-silicon |
            | Windows x64 | ratatui-counter-app.exe |

            ## Usage

            **Linux**: `sudo dpkg -i ratatui-counter-app.deb` then run `ratatui-counter-app`
            **macOS**: `chmod +x ratatui-counter-app-macos-*` then `./ratatui-counter-app-macos-*`
            **Windows**: Run `ratatui-counter-app.exe` directly
          files: artifacts/**/*
          draft: false
          prerelease: false
