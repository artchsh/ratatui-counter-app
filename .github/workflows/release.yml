name: CI/CD

on:
  push:
    branches: ['*']
    tags:
      - 'v*'
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: check
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: system-info-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: system-info-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: system-info-macos-apple-silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: system-info-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux (.deb)
        if: matrix.os == 'ubuntu-latest'
        run: |
          PKG=system-info_amd64
          mkdir -p dist/$PKG/DEBIAN dist/$PKG/usr/bin
          cp target/${{ matrix.target }}/release/system-info dist/$PKG/usr/bin/
          chmod +x dist/$PKG/usr/bin/system-info
          printf 'Package: system-info\nVersion: 0.1.0\nArchitecture: amd64\nMaintainer: artchsh\nDescription: System monitor TUI\n' \
            > dist/$PKG/DEBIAN/control
          dpkg-deb --build dist/$PKG dist/system-info.deb

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/system-info dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\system-info.exe dist\system-info.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create source archive
        run: git archive --format=zip --output=source-code.zip HEAD

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || format('Build #{0}', github.run_number) }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Source Code | source-code.zip |
            | Linux x64 | system-info.deb |
            | macOS Intel | system-info-macos-intel |
            | macOS Apple Silicon | system-info-macos-apple-silicon |
            | Windows x64 | system-info.exe |

            ## Usage

            **Linux**: `sudo dpkg -i system-info.deb` then run `system-info`
            **macOS**: `chmod +x system-info-macos-*` then `./system-info-macos-*`
            **Windows**: Run `system-info.exe` directly
          files: |
            source-code.zip
            artifacts/**/*
          draft: false
          prerelease: false
